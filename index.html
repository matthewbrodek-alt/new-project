<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gardens of Eden | Luxury Residences Phuket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
</head>
<body class="bg-white text-slate-900 font-['Lato'] antialiased">

    <header class="fixed w-full z-50 transition-all duration-500" id="main-header">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="logo text-2xl font-['Montserrat'] font-bold tracking-tighter">
                GARDENS <span class="font-light">OF EDEN</span>
            </div>
            
            <div class="hidden md:flex space-x-8 items-center uppercase text-xs tracking-widest font-medium">
                <a href="#projects" class="hover:opacity-50 transition">Residences</a>
                <a href="#amenities" class="hover:opacity-50 transition">Infrastructure</a>
                <a href="#location" class="hover:opacity-50 transition">Location</a>
                <div class="flex space-x-2 border-l pl-8 ml-4 border-slate-300" id="lang-switcher">
                    <button class="font-bold underline" data-lang="en">EN</button>
                    <button class="opacity-50" data-lang="ru">RU</button>
                    <button class="opacity-50" data-lang="th">TH</button>
                </div>
            </div>

            <button class="md:hidden" id="mobile-menu-btn">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
            </button>
        </nav>
    </header>

    <section class="relative h-screen flex items-center justify-center overflow-hidden">
        <video autoplay loop muted playsinline class="absolute z-10 w-auto min-w-full min-h-full max-w-none brightness-50">
            <source src="assets/video/hero.mp4" type="video/mp4">
        </video>
        
        <div class="relative z-20 text-center text-white px-4">
            <h1 class="text-4xl md:text-7xl font-['Montserrat'] font-light tracking-[0.2em] mb-6 translate-y-10 opacity-0 animate-fade-up">
                A NEW STANDARD OF LUXURY
            </h1>
            <p class="text-lg md:text-xl font-light tracking-widest mb-10 opacity-70">PHUKET • BANG TAO • 50M TO BEACH</p>
            <button class="border border-white px-10 py-4 uppercase text-xs tracking-[0.3em] hover:bg-white hover:text-black transition-all duration-500">
                Explore Eden
            </button>
        </div>
        
        <div class="absolute bottom-10 left-1/2 -translate-x-1/2 z-20 animate-bounce">
            <div class="w-[1px] h-16 bg-gradient-to-b from-white to-transparent"></div>
        </div>
    </section>

    <section id="projects" class="py-32 bg-gray-50">
        <div class="container mx-auto px-6">
            <h2 class="text-3xl font-['Montserrat'] font-light mb-20 text-center tracking-[0.2em] uppercase text-slate-400">The Residences</h2>
            <div id="residences-grid" class="grid md:grid-cols-3 gap-12">
                </div>
        </div>
    </section>

    <section id="amenities" class="py-32 bg-white text-slate-900">
        <div class="container mx-auto px-6">
            <div class="text-center mb-24">
                <h2 class="text-3xl font-['Montserrat'] font-light tracking-[0.2em] uppercase">Infrastructure</h2>
                <div class="w-12 h-[1px] bg-black mx-auto mt-6"></div>
            </div>
            
            <div id="amenities-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-16 gap-y-20">
                </div>
        </div>
    </section>

    <div id="contact-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/90 backdrop-blur-md transition-all duration-500">
        <div class="bg-white p-12 max-w-lg w-full relative mx-4">
            <button id="close-modal" class="absolute top-6 right-6 text-3xl font-light hover:rotate-90 transition-transform">&times;</button>
            <h3 class="text-2xl font-['Montserrat'] mb-2 uppercase tracking-tight">Request Info</h3>
            <p class="text-slate-400 text-sm mb-8">Leave your details and our concierge will contact you.</p>
            <form id="lead-form" class="space-y-6">
                <input type="text" placeholder="Full Name" class="w-full border-b border-slate-200 py-3 focus:outline-none focus:border-black transition" required>
                <input type="tel" placeholder="Phone Number" class="w-full border-b border-slate-200 py-3 focus:outline-none focus:border-black transition" required>
                <select class="w-full border-b border-slate-200 py-3 focus:outline-none focus:border-black transition bg-transparent text-slate-500">
                    <option>General Request</option>
                    <option>Investment Inquiry</option>
                    <option>Brochure Download</option>
                </select>
                <button class="w-full bg-black text-white py-5 uppercase text-[10px] tracking-[0.3em] mt-8 hover:bg-zinc-800 transition-colors">Send Request</button>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
